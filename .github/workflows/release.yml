# release
name: Release Agent

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/revtunnel-darwin-arm64       ./cmd/agent
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/revtunnel-darwin-amd64       ./cmd/agent
          GOOS=linux   GOARCH=amd64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/revtunnel-linux-amd64        ./cmd/agent
          GOOS=windows GOARCH=amd64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/revtunnel-windows-amd64.exe  ./cmd/agent

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
