name: Deploy to VPS

on:
  push:
    branches: main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Build server binary
        run: |
          GOOS=linux GOARCH=amd64 go build -o tunnel-server ./cmd/server

      - name: Copy binary to VPS
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "tunnel-server"
          target: "/tmp/"

      - name: Restart systemd service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mv /tmp/tunnel-server /usr/local/bin/tunnel-server
            chmod +x /usr/local/bin/tunnel-server
            systemctl restart tunnel
            systemctl is-active --quiet tunnel && echo "Service is running" || echo "Service failed to start"

name: Release Agent

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=darwin  GOARCH=arm64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/revtunnel-darwin-arm64      ./cmd/agent
          GOOS=darwin  GOARCH=amd64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/revtunnel-darwin-amd64      ./cmd/agent
          GOOS=linux   GOARCH=amd64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/revtunnel-linux-amd64       ./cmd/agent
          GOOS=windows GOARCH=amd64 go build -ldflags="-X main.version=${{ github.ref_name }}" -o dist/revtunnel-windows-amd64.exe ./cmd/agent

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*